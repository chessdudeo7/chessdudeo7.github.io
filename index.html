<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | Matthew Zhu</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    const slider = document.getElementById('slider');
    const btnLeft = document.querySelector('.slide-btn.left');
    const btnRight = document.querySelector('.slide-btn.right');

    if (btnLeft && slider) btnLeft.addEventListener('click', () => { slider.scrollBy({ left: -240, behavior: 'smooth' }); });
    if (btnRight && slider) btnRight.addEventListener('click', () => { slider.scrollBy({ left: 240, behavior: 'smooth' }); });
  </script>

  <script>
    (function(){
      const selectors = ['.section','header.hero','.project-card','.slide','.content','.logo','.hero-links a'];
      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) { entry.target.classList.add('reveal'); obs.unobserve(entry.target); }
        });
      }, { threshold: 0.12 });

      selectors.forEach(sel => document.querySelectorAll(sel).forEach(el => { el.classList.add('fade-up'); observer.observe(el); }));

      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.querySelectorAll('.fade-up').forEach(el => el.classList.add('reveal'));
        observer.disconnect();
      }
    })();
  </script>
    html,body{height:100%;font-family:'Poppins',sans-serif;color:#e6eef8}

    body{
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;text-align:center;
      background: linear-gradient(120deg,var(--bg-a),var(--bg-b));
      background-size:400% 400%;
      animation: gradientShift 14s ease infinite;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    .content{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}

    h1{font-size:3rem;color:var(--accent-1);margin-bottom:28px;letter-spacing:0.6px}

    .button-group{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}

    .button{
      background: linear-gradient(90deg,var(--accent-1),var(--accent-2));
      color:white;padding:12px 26px;border-radius:10px;text-decoration:none;font-weight:700;font-size:1.05rem;
      box-shadow: 0 8px 20px rgba(15,23,42,0.45);
      transform: translateZ(0);
      transition: transform .28s cubic-bezier(.2,.9,.2,1), box-shadow .28s ease, opacity .2s ease;
      will-change: transform;
    }

    .button:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 14px 30px rgba(15,23,42,0.55)}
    .button:focus{outline:var(--focus);outline-offset:3px}

    /* reveal helpers */
    .fade-up{opacity:0;transform:translateY(18px);transition:opacity .65s cubic-bezier(.2,.9,.2,1),transform .65s cubic-bezier(.2,.9,.2,1)}
    .fade-up.reveal{opacity:1;transform:none}

    @media (max-width:500px){h1{font-size:2.2rem}.button{padding:12px 20px}}
  </style>
</head>
<body>

  <div class="content">
    <h1>Welcome</h1>
    <div class="button-group">
      <a href="profile.html" class="button">Profile</a>
      <a href="tutoring.html" class="button">Tutoring</a>
    </div>
  </div>

</body>
</html>
