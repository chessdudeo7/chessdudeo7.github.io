<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Session | Matthew Zhu</title>
    <link rel="stylesheet" href="style.css">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        /* Fallback Styles in case style.css variables aren't defined */
        :root {
            --bg-dark: #0f172a;        /* Deep navy/slate */
            --card-bg: #1e293b;        /* Lighter slate for cards */
            --accent-purple: #6366f1;   /* Muted Indigo instead of Neon Purple */
            --accent-soft: #4338ca;     /* Darker shade for borders/hover */
            --text-main: #f1f5f9;       /* Off-white for less glare */
            --muted: #94a3b8;           /* Muted blue-grey for secondary text */
        }

        /* Update the "Today" highlight to be very subtle */
        .fc-day-today {
            background-color: rgba(99, 102, 241, 0.05) !important;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        #calendar {
            max-width: 900px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Modal styling */
        #booking-modal {
            display: none;
            position: fixed; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e293b;
            padding: 30px; 
            border-radius: 12px;
            border: 1px solid var(--accent-purple);
            z-index: 1000; 
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        #booking-modal input, #booking-modal select {
            width: 100%; 
            padding: 10px; 
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            box-sizing: border-box;
        }

        #overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0;
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 999;
        }

        .button-confirm {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .button-confirm:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

<nav class="navbar" style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
    <div class="logo"><a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">Matthew Zhu</a></div>
    <ul style="list-style: none; display: flex; gap: 20px; margin: 0;">
        <li><a href="index.html" style="color: white; text-decoration: none;">Profile</a></li>
        <li><a href="tutoring.html" style="color: white; text-decoration: none;">Tutoring</a></li>
        <li><a href="booking.html" style="color: var(--accent-purple); text-decoration: none; font-weight: bold;">Book</a></li>
    </ul>
</nav>

<div style="text-align: center; margin-top: 50px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Book a Lesson</h1>
    <p style="color: #94a3b8;">Select a purple slot below to reserve your time.</p>
</div>

<div id="calendar"></div>

<div id="overlay" onclick="closeModal()"></div>

<div id="booking-modal">
    <h3 style="color: var(--accent-purple); margin-top: 0;">Confirm Booking</h3>
    <p id="selected-time-display" style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px;"></p>
    
    <form action="/api/book" method="POST" enctype="multipart/form-data">
        <input type="hidden" id="slot_id" name="slot_id" required>
        
        <input type="text" name="student_name" placeholder="Your Full Name" required>
        <input type="email" name="student_email" placeholder="Your Email Address" required>
        
        <label style="display: block; margin-bottom: 5px; font-size: 0.8rem;">Subject</label>
        <select name="subject" required>
            <option value="Chess">Chess Coaching</option>
            <option value="Math">Mathematics</option>
            <option value="Physics">Physics</option>
        </select>

        <label style="display: block; margin-bottom: 5px; font-size: 0.8rem;">Diagnostic CSV (Optional)</label>
        <input type="file" name="diagnostic_file" accept=".csv">
        
        <button type="submit" class="button-confirm">Confirm & Lock Slot</button>
    </form>
</div>

<script>
    function closeModal() {
        document.getElementById('booking-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function() {
        // 1. Check for success message in URL
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('success')) {
            alert("Booking confirmed! Check your email for details.");
        }

        // 2. Initialize FullCalendar
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'timeGridWeek,timeGridDay'
            },
            allDaySlot: false,
            slotMinTime: '08:00:00',
            slotMaxTime: '22:00:00',
            events: '/api/slots', // Points to your Flask GET route
            eventClick: function(info) {
                // If the title says Booked, don't let them click it
                if (info.event.title === "Session Booked") {
                    alert("This slot is already reserved.");
                    return;
                }

                document.getElementById('slot_id').value = info.event.id;
                document.getElementById('selected-time-display').innerText = 
                    "Selected: " + info.event.start.toLocaleString();
                
                document.getElementById('booking-modal').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            }
        });

        calendar.render();
    });
</script>

</body>
</html>
